<!DOCTYPE html>
<html>
<head>
    <title>Student Activity Tracker</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<header>
    <h1>Student Activity Tracker</h1>
</header>

<nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showActivities()">View Activities</button>
</nav>

<div class="container">

    <!-- Home Section -->
    <div id="homeSection">
        <h2>Welcome!</h2>
        <p>This web application helps students track their learning activities.</p>
    </div>

    <!-- Activity Section -->
    <div id="activitySection" style="display:none;">
        <h2>Activity List</h2>
        <div id="activityList"></div>
        <h3 id="progressSummary"></h3>
    </div>

</div>

<script src="script1.js"></script>
</body>
</html>
